name: Python tests
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: '30 2 * * *'
jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test data file
        run : |
          mkdir -p data reports
          cat > data/test_data.json <<'EOF'
          {
            "base_url":"https://api.github.com",
            "token":"${{secrets.API_TOKEN}},
            "username":"Ananya-060",
            "new_repo":{
            "description":"Automated test repository",
            "private":false},
            "updated_repo":{
            "description":"Updated by automation"
            }
          }
          EOF

      - name: Run pytest
        run: |
          pytest --s --html=reports/report.html --self-contained-html


      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/
