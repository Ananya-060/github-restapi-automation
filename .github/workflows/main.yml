name: Python tests

on:
  push:
    branches:
      -main

  pull_request:
      -main

  schedule:
      
        -cron: '30 2 * * *'
jobs:
  run-tests:
  runs-on: ubuntu-latest
  steps:
  -name: Checkout code
   uses: action/checkout@v4

  -name: Setup Python
   uses: action/setup@v5
   with:
       python-version :'3.9'

  -name: Install dependencies
   run: |
       python -m pip install --upgrade pip
       pip install -r requirements.txt

  -name: Create test data file
   run: |
       mkdir -p data reports
       cat > data/test_data.json <<'EOF'
       {
         "base_url":"https://api.github.com",
         "token":"${{secrets.API_TOKEN}}",
         "username":"Ananya-060",
         "new_repo":{
         "description":"Automated test repository",
         "private":false},
         "updated_repo":{
         "description":"Updated by automation"
         }
        }
  -name: Run tests
   run: |
       pytest -s --html=reports.html --self-contained-html

  -name: Upload report
   uses: action/upload_artifact@v4
   with:
        -name: pytest-report
         path: reports

